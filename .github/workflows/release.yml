name: Release Extension

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag matches package.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          expected="${TAG_NAME#v}"
          actual="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")"

          if [ "$actual" != "$expected" ]; then
            echo "::error::Tag version $expected does not match package.json version $actual"
            exit 1
          fi

      - name: Build extension
        run: pnpm build

      - name: Validate built manifest version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node - <<'EOF'
          const fs = require('fs')

          const tagVersion = process.env.TAG_NAME.slice(1)
          const expectedVersion = tagVersion.split('-')[0]
          const expectedVersionName = tagVersion
          const manifest = JSON.parse(fs.readFileSync('build/chrome-mv3-prod/manifest.json', 'utf8'))
          const actualVersion = manifest.version
          const actualVersionName = manifest.version_name || manifest.version

          if (actualVersion !== expectedVersion) {
            console.error(
              `::error::Built manifest version ${actualVersion} does not match expected manifest version ${expectedVersion}`
            )
            process.exit(1)
          }

          if (actualVersionName !== expectedVersionName) {
            console.error(
              `::error::Built manifest version_name ${actualVersionName} does not match tag version ${expectedVersionName}`
            )
            process.exit(1)
          }
          EOF

      - name: Package extension
        run: pnpm package

      - name: Locate packaged archive
        id: packaged_archive
        run: |
          mapfile -t archives < <(find build -type f -name '*.zip' | sort)

          if [ "${#archives[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one packaged archive, found ${#archives[@]}"
            printf '%s\n' "${archives[@]}"
            exit 1
          fi

          echo "path=${archives[0]}" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes and asset
        id: prepare_release
        env:
          TAG_NAME: ${{ github.ref_name }}
          ARCHIVE_PATH: ${{ steps.packaged_archive.outputs.path }}
        run: |
          version="${TAG_NAME#v}"

          node scripts/prepare-release.mjs \
            --tag "$TAG_NAME" \
            --archive "$ARCHIVE_PATH" \
            --changelog CHANGELOG.md \
            --notes-out "build/release-notes-v${version}.md" \
            --github-output "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_PATH: ${{ steps.prepare_release.outputs.asset_path }}
          NOTES_PATH: ${{ steps.prepare_release.outputs.notes_path }}
        run: |
          prerelease_args=()

          if [[ "$TAG_NAME" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            mapfile -t existing_assets < <(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')

            for asset_name in "${existing_assets[@]}"; do
              if [[ "$asset_name" == *.zip ]]; then
                gh release delete-asset "$TAG_NAME" "$asset_name" --yes
              fi
            done

            gh release upload "$TAG_NAME" "$ASSET_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ASSET_PATH" \
              "${prerelease_args[@]}" \
              --title "$TAG_NAME" \
              --notes-file "$NOTES_PATH"
          fi

          gh release edit "$TAG_NAME" \
            "${prerelease_args[@]}" \
            --draft=false \
            --title "$TAG_NAME" \
            --notes-file "$NOTES_PATH"
